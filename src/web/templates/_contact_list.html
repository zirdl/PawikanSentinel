{% if message %}
<div class="flex items-start gap-2 px-4 py-3 mb-4 bg-success-50 border border-success-200 rounded-xl text-success-800 text-body-sm" role="alert">
    <span class="material-icons text-base flex-shrink-0 mt-0.5">check_circle</span>
    <span>{{ message }}</span>
</div>
{% endif %}

{% if contacts %}
<div class="space-y-3">
    {% for contact in contacts %}
    <div class="flex items-center p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors">
        <div class="flex-shrink-0 h-9 w-9 rounded-full bg-ocean-100 flex items-center justify-center">
            <span class="material-icons text-ocean-600 text-base">person</span>
        </div>
        <div class="ml-3 flex-grow min-w-0">
            <h3 class="text-body-sm font-medium text-gray-900 truncate">{{ contact.name }}</h3>
            <p class="text-caption text-gray-500 truncate">{{ contact.phone }}</p>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0 ml-2">
            <button hx-get="/contacts/edit-form/{{ contact.id }}" hx-target="#modal-content" hx-swap="innerHTML"
                    class="p-1.5 rounded-lg text-white bg-turtle-500 hover:bg-turtle-600 transition-colors"
                    aria-label="Edit contact">
                <span class="material-icons text-sm">edit</span>
            </button>
            <button hx-delete="/contacts/{{ contact.id }}" hx-target="#contacts-container" hx-swap="innerHTML"
                    hx-confirm="Are you sure you want to delete this contact?"
                    class="p-1.5 rounded-lg text-white bg-danger-500 hover:bg-danger-600 transition-colors"
                    aria-label="Delete contact">
                <span class="material-icons text-sm">delete</span>
            </button>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-center py-8">
    <span class="material-icons text-4xl text-gray-300 mb-2">person_off</span>
    <h3 class="text-body-sm font-medium text-gray-900">No contacts added</h3>
    <p class="text-caption text-gray-500 mt-1">Get started by adding an emergency contact.</p>
</div>
{% endif %}
