<form hx-post="/contacts/add-or-update" hx-target="#contacts-container" hx-swap="innerHTML" class="p-6">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    {% if contact %}
    <input type="hidden" name="contact_id" value="{{ contact.id }}">
    {% endif %}

    <h3 class="text-title text-gray-900 mb-5">{% if contact %}Edit Contact{% else %}Add New Contact{% endif %}</h3>

    <div class="space-y-4">
        <div>
            <label for="name" class="block text-body-sm font-medium text-gray-700 mb-1.5">Full Name</label>
            <input type="text" name="name" id="name" required
                   class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-body bg-white
                          focus:outline-none focus:ring-2 focus:ring-turtle-500/20 focus:border-turtle-500
                          transition-colors duration-150"
                   value="{{ contact.name if contact else '' }}" placeholder="John Doe">
        </div>

        <div>
            <label for="phone" class="block text-body-sm font-medium text-gray-700 mb-1.5">Phone Number</label>
            <input type="text" name="phone" id="phone" required
                   class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-body bg-white
                          focus:outline-none focus:ring-2 focus:ring-turtle-500/20 focus:border-turtle-500
                          transition-colors duration-150"
                   value="{{ contact.phone if contact else '' }}" placeholder="+1 (555) 123-4567">
        </div>
    </div>

    <div class="mt-6 flex justify-end gap-2">
        <button type="button" onclick="closeModal()"
                class="px-4 py-2 text-body-sm font-medium text-gray-700 bg-white border border-gray-300
                       rounded-lg hover:bg-gray-50 transition-colors duration-200">
            Cancel
        </button>
        <button type="submit"
                class="px-4 py-2 text-body-sm font-semibold text-white bg-turtle-500 hover:bg-turtle-600
                       rounded-lg transition-colors duration-200 flex items-center gap-1.5">
            <span class="material-icons text-base">{% if contact %}sync{% else %}person_add{% endif %}</span>
            {% if contact %}Update{% else %}Add{% endif %} Contact
        </button>
    </div>
</form>
