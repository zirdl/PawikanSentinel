<form hx-post="/cameras/add-or-update" hx-target="#cameras-container" hx-swap="innerHTML" class="p-6">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    {% if camera %}
    <input type="hidden" name="camera_id" value="{{ camera.id }}">
    {% endif %}

    <h3 class="text-title text-gray-900 mb-5">{% if camera %}Edit Camera{% else %}Add New Camera{% endif %}</h3>

    <div class="space-y-4">
        <div>
            <label for="name" class="block text-body-sm font-medium text-gray-700 mb-1.5">Camera Location</label>
            <input type="text" name="name" id="name" required
                   class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-body bg-white
                          focus:outline-none focus:ring-2 focus:ring-turtle-500/20 focus:border-turtle-500
                          transition-colors duration-150"
                   value="{{ camera.name if camera else '' }}" placeholder="e.g. North Beach">
        </div>

        <div>
            <label for="rtsp_url" class="block text-body-sm font-medium text-gray-700 mb-1.5">RTSP URL</label>
            <input type="text" name="rtsp_url" id="rtsp_url" required
                   class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-body bg-white
                          focus:outline-none focus:ring-2 focus:ring-turtle-500/20 focus:border-turtle-500
                          transition-colors duration-150"
                   value="{{ camera.rtsp_url if camera else '' }}" placeholder="rtsp://example.com/stream">
        </div>

        <div class="flex items-center gap-2">
            <input type="checkbox" name="active" id="active"
                   class="h-4 w-4 rounded border-gray-300 text-turtle-500 focus:ring-turtle-500"
                   {% if not camera or camera.active %}checked{% endif %}>
            <label for="active" class="text-body-sm text-gray-700">Active</label>
        </div>
    </div>

    <div class="mt-6 flex justify-end gap-2">
        <button type="button" onclick="closeModal()"
                class="px-4 py-2 text-body-sm font-medium text-gray-700 bg-white border border-gray-300
                       rounded-lg hover:bg-gray-50 transition-colors duration-200">
            Cancel
        </button>
        <button type="submit"
                class="px-4 py-2 text-body-sm font-semibold text-white bg-turtle-500 hover:bg-turtle-600
                       rounded-lg transition-colors duration-200 flex items-center gap-1.5">
            <span class="material-icons text-base">{% if camera %}sync{% else %}add{% endif %}</span>
            {% if camera %}Update{% else %}Add{% endif %} Camera
        </button>
    </div>
</form>
